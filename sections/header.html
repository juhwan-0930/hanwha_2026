<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- 폰트어썸 불러오기 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="header_top height-100p flex flex-ai-c">
        <ul class="partner_logos flex flex-ai-c height-100p">
          <li>
            <a href="#"
              ><img class="logo-1" src="../imgs/logo-plus-etf-w.svg" alt=""
            /></a>
          </li>
          <span>|</span>
          <li>
            <a href="#"
              ><img class="logo-2" src="../imgs/logo-pine-w.svg" alt=""
            /></a>
          </li>
        </ul>
      </div>

      <div class="inner">
        <div></div>
        <div></div>
        <div></div>
      </div>
    </header>

    <style>
      /* 노말라이즈 */
      body,
      ul,
      li,
      h1 {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* 라이브러리 */
      .border-red {
        border: 4px solid red;
      }

      .border-pink {
        border: 4px solid pink;
      }

      .border-blue {
        border: 4px solid blue;
      }

      .border-green {
        border: 4px solid green;
      }

      .border-black {
        border: 4px solid black;
      }

      .border-gold {
        border: 4px solid gold;
      }

      .flex {
        display: flex;
      }

      .flex-jc-e {
        justify-content: flex-end;
      }

      .flex-jc-s {
        justify-content: flex-start;
      }

      .flex-jc-c {
        justify-content: center;
      }

      .flex-jc-sb {
        justify-content: space-between;
      }

      .flex-ai-c {
        align-items: center;
      }

      .flex-grow-1 {
        flex-grow: 1;
      }

      .height-100p {
        height: 100%;
      }

      .block {
        display: block;
      }

      .con {
        margin-left: auto;
        margin-right: auto;
      }

      .img-box > img {
        width: 100%;
        display: block;
      }

      .relative {
        position: relative;
      }

      /* 커스텀 */
      .con {
        width: 1080px;
      }

      .con-min-width {
        min-width: 1080px;
      }
      /* 노말라이즈 끝 */
      .header_top {
        width: 100%;
        height: 40px;
        background-color: #00000099;
        justify-content: flex-end;
      }

      .partner_logos {
        color: #fff;
        padding-right: 36px;
        gap: 24px;
      }

      .header_top > .partner_logos > li > a > .logo-1 {
        width: 99px;
      }

      .header_top > .partner_logos > li > a > .logo-2 {
        width: 40px;
      }

      .header_top > .partner_logos > span {
        font-size: 10px;
      }

      .inner {
        width: 100%;
        height: 96px;
        background-color: #27262670;
      }
    </style>
  </body>
</html>
