<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- 폰트어썸 불러오기 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <!-- 제이쿼리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body>
    <header>
      <div class="header-top height-100p flex flex-ai-c">
        <ul class="partner-brand-list flex flex-ai-c height-100p">
          <li>
            <a href="#">
              <img
                class="partner-brand-plus"
                src="../imgs/logo-plus-etf-w.svg"
                alt=""
              />
            </a>
          </li>
          <span>|</span>
          <li>
            <a href="#">
              <img
                class="partner-brand-pine"
                src="../imgs/logo-pine-w.svg"
                alt=""
              />
            </a>
          </li>
        </ul>
      </div>

      <div class="header-main flex">
        <div class="header-logo flex flex-ai-c">
          <a href="#">
            <img src="../imgs/logo-w.svg" alt="" />
          </a>
        </div>

        <div class="main-nav-wrap flex flex-ai-c">
          <ul class="main-nav-list flex flex-ai-c">
            <li class="main-nav-item flex flex-ai-c">
              <a href="#">펀드 상품</a>
              <ul class="nav-sub-list">
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">펀드찾기</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">개인연금</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">퇴직연금</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">TDF</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">PLUS ETF</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
              </ul>
            </li>

            <li class="main-nav-item flex flex-ai-c">
              <a href="#">인사이트</a>
              <ul class="nav-sub-list">
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">공지</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">투자정보</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">시황</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">자주 묻는 질문</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
              </ul>
            </li>

            <li class="main-nav-item flex flex-ai-c">
              <a href="#">공시안내</a>
              <ul class="nav-sub-list">
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">전체공시</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">편드공시</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">경영공시</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">리츠공시</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">연금공시</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
              </ul>
            </li>

            <li class="main-nav-item flex flex-ai-c">
              <a href="#">회사소개</a>
              <ul class="nav-sub-list">
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">한화자산운용 소개</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">글로벌 네트워크</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">운용시스템</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
                <li class="nav-sub-item flex flex-ai-c">
                  <a href="#">채용정보</a>
                  <span><i class="fa-solid fa-arrow-right-long"></i></span>
                </li>
              </ul>
            </li>
          </ul>
        </div>

        <div class="header-action-group flex flex-ai-c">
          <ul class="header-action-list flex flex-ai-c height-100p">
            <li class="language-dropdown flex flex-ai-c height-100p">
              <span>KR</span>
              <a class="language-toggle-btn" href="#">
                <i class="fa-solid fa-caret-down"></i>
              </a>
              <ul class="language-list">
                <li><a href="#">KR</a></li>
                <li><a href="#">EN</a></li>
              </ul>
            </li>

            <li>
              <a class="search-open-btn" href="#">
                <i class="fa-solid fa-magnifying-glass"></i>
              </a>

              <div class="search-modal">
                <div class="search-modal-content">
                  <div class="search-modal-header">
                    <div><img src="../imgs/logo.svg" alt="" /></div>
                    <span><i class="fa-solid fa-xmark"></i></span>
                  </div>

                  <div class="search-area flex flex-ai-c border-red">
                    <div class="search-box flex flex-ai-c border-blue">
                      <span>펀드명을 입력하세요</span>
                      <a href="#">
                        <i class="fa-solid fa-magnifying-glass"></i>
                      </a>
                    </div>
                  </div>
                </div>
              </div>
            </li>

            <li>
              <a class="mobile-menu-btn" href="#">
                <i class="fa-solid fa-bars"></i>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </header>

    <style>
      @font-face {
        font-family: "Pretendard";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Thin.woff2")
          format("woff2");
        font-weight: 100;
        font-display: swap;
      }

      @font-face {
        font-family: "Pretendard";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraLight.woff2")
          format("woff2");
        font-weight: 200;
        font-display: swap;
      }

      @font-face {
        font-family: "Pretendard";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Light.woff2")
          format("woff2");
        font-weight: 300;
        font-display: swap;
      }

      @font-face {
        font-family: "Pretendard";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2")
          format("woff2");
        font-weight: 400;
        font-display: swap;
      }

      @font-face {
        font-family: "Pretendard";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Medium.woff2")
          format("woff2");
        font-weight: 500;
        font-display: swap;
      }

      @font-face {
        font-family: "Pretendard";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-SemiBold.woff2")
          format("woff2");
        font-weight: 600;
        font-display: swap;
      }

      @font-face {
        font-family: "Pretendard";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Bold.woff2")
          format("woff2");
        font-weight: 700;
        font-display: swap;
      }

      @font-face {
        font-family: "Pretendard";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraBold.woff2")
          format("woff2");
        font-weight: 800;
        font-display: swap;
      }

      @font-face {
        font-family: "Pretendard";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Black.woff2")
          format("woff2");
        font-weight: 900;
        font-display: swap;
      }

      body {
        font-family: "Pretendard", sans-serif;
      }

      body,
      ul,
      li,
      h1 {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      * {
        box-sizing: border-box;
      }

      /* 라이브러리 */
      .border-red {
        border: 4px solid red;
      }

      .border-pink {
        border: 4px solid pink;
      }

      .border-blue {
        border: 4px solid blue;
      }

      .border-green {
        border: 4px solid green;
      }

      .border-black {
        border: 4px solid black;
      }

      .border-gold {
        border: 4px solid gold;
      }

      .flex {
        display: flex;
      }

      .flex-jc-e {
        justify-content: flex-end;
      }

      .flex-jc-s {
        justify-content: flex-start;
      }

      .flex-jc-c {
        justify-content: center;
      }

      .flex-jc-sb {
        justify-content: space-between;
      }

      .flex-ai-c {
        align-items: center;
      }

      .flex-grow-1 {
        flex-grow: 1;
      }

      .height-100p {
        height: 100%;
      }

      .block {
        display: block;
      }

      .con {
        margin-left: auto;
        margin-right: auto;
      }

      .img-box > img {
        width: 100%;
        display: block;
      }

      .relative {
        position: relative;
      }

      /* 커스텀 */
      .con {
        width: 1080px;
      }

      .con-min-width {
        min-width: 1080px;
      }

      .header-top {
        width: 100%;
        height: 40px;
        background-color: #00000099;
        justify-content: flex-end;
      }

      .partner-brand-list {
        color: #fff;
        padding-right: 36px;
        gap: 24px;
      }

      .partner-brand-plus {
        width: 99px;
      }

      .partner-brand-pine {
        width: 40px;
      }

      .partner-brand-list > span {
        font-size: 10px;
      }

      .header-main {
        width: 100%;
        height: 96px;
        background-color: #27262670;
        justify-content: space-between;
        padding: 0 40px;
      }

      .header-logo img {
        width: 192px;
      }

      .main-nav-list {
        gap: 56px;
      }

      .main-nav-item {
        position: relative;
        height: 96px;
        padding: 0 12px;
      }

      .main-nav-item > a {
        font-size: 21px;
        font-weight: 600;
        color: #fff;
      }

      .nav-sub-list {
        position: absolute;
        top: 100%;
        left: -10px;
        min-width: 202px;
        background-color: #27262650;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s;
      }

      .main-nav-item:hover .nav-sub-list {
        opacity: 1;
        visibility: visible;
      }

      .nav-sub-item {
        width: 202px;
        height: 40px;
        padding: 24px;
        justify-content: space-between;
        transition: background-color 0.1s;
      }

      .nav-sub-item > a {
        color: #fff;
        font-size: 18px;
      }

      .nav-sub-item:hover {
        background-color: #27262690;
      }

      .nav-sub-item:hover > a {
        color: #fe5b16;
      }

      .nav-sub-item i {
        display: none;
        color: #fe5b16;
      }

      .nav-sub-item:hover i {
        display: block;
      }

      .header-action-list {
        gap: 32px;
      }

      .language-dropdown {
        position: relative;
        gap: 8px;
        cursor: pointer;
      }

      .language-dropdown > span {
        font-size: 18px;
        color: #fff;
      }

      .language-toggle-btn > i {
        font-size: 14px;
        color: #fff;
      }

      .language-list {
        position: absolute;
        top: 100%;
        left: -24px;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s;
      }

      .language-list.active {
        opacity: 1;
        visibility: visible;
      }

      .language-list > li {
        background-color: #27262650;
        color: #fff;
        font-size: 18px;
        width: 88px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.1s;
      }

      .language-list > li:hover {
        background-color: #27262690;
        color: #fe5b16;
      }

      .search-open-btn,
      .mobile-menu-btn {
        font-size: 30px;
        color: #fff;
      }

      .search-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #27262690;
        display: none;
      }

      .search-modal-content {
        width: 100%;
        height: 504px;
        background-color: #fff;
      }

      .search-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        height: 96px;
        padding: 90px 40px;
      }

      .search-modal-header > span {
        font-size: 40px;
      }

      .search-area {
        width: 100%;
        height: 80px;
        justify-content: center;
        padding: 56px 0;
      }

      .search-box {
        width: 720px;
        justify-content: space-between;
        padding: 0 8px;
      }

      .search-box > span {
        font-size: 32px;
        color: rgba(0, 0, 0, 0.6);
      }

      .search-box > a > i {
        font-size: 32px;
      }
    </style>

    <script>
      $(".language-dropdown").click(function () {
        $(".language-list").toggleClass("active");
      });
    </script>
  </body>
</html>
