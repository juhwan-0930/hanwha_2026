<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- 폰트어썸 불러오기 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="header_top">
        <ul class="partner_logos flex">
          <li>
            <a href="#"><img src="../imgs/logo-plus-etf-w.svg" alt="" /></a>
          </li>
          <span>|</span>
          <li>
            <a href="#"><img src="../imgs/logo-pine-w.svg" alt="" /></a>
          </li>
        </ul>
      </div>
    </header>

    <style>
      /* 노말라이즈 */
      body,
      ul,
      li,
      h1 {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* 라이브러리 */
      .border-red {
        border: 4px solid red;
      }

      .border-pink {
        border: 4px solid pink;
      }

      .border-blue {
        border: 4px solid blue;
      }

      .border-green {
        border: 4px solid green;
      }

      .border-black {
        border: 4px solid black;
      }

      .border-gold {
        border: 4px solid gold;
      }

      .flex {
        display: flex;
      }

      .flex-jc-e {
        justify-content: flex-end;
      }

      .flex-jc-s {
        justify-content: flex-start;
      }

      .flex-jc-c {
        justify-content: center;
      }

      .flex-jc-sb {
        justify-content: space-between;
      }

      .flex-ai-c {
        align-items: center;
      }

      .flex-grow-1 {
        flex-grow: 1;
      }

      .height-100p {
        height: 100%;
      }

      .block {
        display: block;
      }

      .con {
        margin-left: auto;
        margin-right: auto;
      }

      .img-box > img {
        width: 100%;
        display: block;
      }

      .relative {
        position: relative;
      }

      /* 커스텀 */
      .con {
        width: 1080px;
      }

      .con-min-width {
        min-width: 1080px;
      }
      /* 노말라이즈 끝 */
      header {
        width: 100%;
        height: 40px;
      }

      .partner_logos {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        color: #fff;
        padding-right: 100px;
        gap: 24px;
        background-color: #00000099;
      }
    </style>
  </body>
</html>
